<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic -->
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Title -->
    <title>WotPan – Simple. Secure. Reliable Messaging</title>

    <!-- SEO Meta -->
    <meta
      name="description"
      content="WotPan is a secure messaging platform with end-to-end encryption. Simple, fast, and private chat for everyone."
    />
    <meta
      name="keywords"
      content="WotPan, secure messaging, encrypted chat, private messaging app, safe chat"
    />
    <meta name="author" content="WotPan" />
    <meta name="robots" content="index, follow" />

    <!-- Canonical -->
    <link rel="canonical" href="https://wotpan.com/" />

    <!-- Favicon -->
    <link rel="icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/favicon.ico" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:title" content="WotPan – Simple. Secure. Reliable Messaging" />
    <meta
      property="og:description"
      content="Chat securely with end-to-end encrypted messaging on WotPan."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://wotpan.com/" />
    <meta property="og:image" content="https://wotpan.com/wotpan.jpg" />
    <meta property="og:site_name" content="WotPan" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="WotPan – Simple. Secure. Reliable Messaging" />
    <meta
      name="twitter:description"
      content="Secure end-to-end encrypted messaging made simple."
    />
    <meta name="twitter:image" content="https://wotpan.com/wotpan.jpg" />

    <!-- Theme Color (Mobile browsers) -->
    <meta name="theme-color" content="#0f172a" />
  </head>

  <body>
    <noscript>
      WotPan requires JavaScript to run properly. Please enable JavaScript.
    </noscript>

    <div id="root"></div>

    <!-- Vite React Entry -->
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
